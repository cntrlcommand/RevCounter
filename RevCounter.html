<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Revolution Church &mdash; Attendance Counter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    html,body{width:100%;height:100%}

    /* ── LIGHT MODE (default) ── */
    :root{
      --navy:#3B6490;--navy2:#2E5078;--blue:#5B9BC8;
      --blue-bg:#E4EFF7;--blue-border:#8BBAD8;
      --bg:#F2F6FA;--card:#ffffff;--border:#B4C8DC;--muted:#6B849E;
      --text:#3B6490;
      --tab-bg:#ffffff;
      --btn-primary-bg:#3B6490;--btn-primary-text:#ffffff;
      --btn-clear-bg:#FDF2F0;--btn-clear-text:#B03020;--btn-clear-border:rgba(176,48,32,.3);
      --cbt-tap:#DCE8F2;--cbt-plus-tap:#E4EFF7;
      --hint-bg:#E4EFF7;--hint-border:#8BBAD8;
      --toggle-track:#B4C8DC;--toggle-thumb:#ffffff;
    }

    /* ── DARK MODE ── */
    body.dark{
      --navy:#3B6490;--navy2:#2E5078;--blue:#5B9BC8;
      --blue-bg:#1E2A3A;--blue-border:#2E4060;
      --bg:#131720;--card:#1C2130;--border:#2A3650;--muted:#7090AA;
      --text:#C8D8EC;
      --tab-bg:#181C28;
      --btn-primary-bg:#2E4A6A;--btn-primary-text:#C8D8EC;
      --btn-clear-bg:#2A1A1A;--btn-clear-text:#D07070;--btn-clear-border:rgba(176,80,80,.3);
      --cbt-tap:#1A2538;--cbt-plus-tap:#1E2A3A;
      --hint-bg:#1A2030;--hint-border:#2A3650;
      --toggle-track:#3B6490;--toggle-thumb:#ffffff;
    }

    body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);min-height:100vh;transition:background .2s,color .2s}
    .app{max-width:600px;margin:0 auto}

    /* ── HEADER ── */
    .hdr{background:var(--navy);padding:14px 22px 12px;display:flex;align-items:center;gap:12px}
    .hdr-logo{width:44px;height:44px;border-radius:9px;flex-shrink:0;object-fit:cover}
    .hdr-r{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
    .hdr-c{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:5px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:2px}
    .hdr-stripe{height:5px;background:linear-gradient(90deg,var(--navy2),var(--blue))}

    /* ── TABS ── */
    .tabs{display:flex;background:var(--tab-bg);border-bottom:2px solid var(--border);transition:background .2s}
    .tab{flex:1;padding:18px 0;font-size:18px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;text-align:center;margin-bottom:-2px;transition:color .2s}
    .tab.on{color:var(--blue);border-bottom-color:var(--blue)}

    /* ── VIEWS ── */
    .view{display:none;padding:22px}
    .view.on{display:block}
    .lbl{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px}

    /* ── CAMPUS / GATHERING ── */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
    .sel-btn{padding:22px 10px;border-radius:16px;border:3px solid var(--border);background:var(--card);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;width:100%;box-shadow:0 2px 6px rgba(0,0,0,.1);transition:all .15s}
    .sel-btn.on{border-color:var(--blue);background:var(--blue-bg);box-shadow:0 0 0 4px rgba(59,100,144,.15)}
    .sel-name{font-size:22px;font-weight:700;color:var(--text)}
    .sel-sub{font-size:14px;color:var(--muted);margin-top:5px}
    .sel-btn.on .sel-sub{color:var(--blue)}
    .sel-btn.custom-btn{grid-column:1/-1;border-style:dashed}
    .sel-btn.custom-btn .sel-name{opacity:.7}
    .sel-btn.custom-btn.on{border-style:solid}
    .sel-btn.custom-btn.on .sel-name{opacity:1}
    .custom-input-wrap{display:none;grid-column:1/-1;margin-bottom:0}
    .custom-input-wrap.show{display:block}
    .custom-input{width:100%;padding:20px 22px;font-family:'DM Sans',sans-serif;font-size:20px;font-weight:600;color:var(--text);border:3px solid var(--blue);border-radius:16px;background:var(--card);outline:none;margin-bottom:12px}
    .custom-input::placeholder{color:var(--muted);font-weight:400}
    .custom-confirm{width:100%;padding:20px;border-radius:16px;border:none;background:var(--btn-primary-bg);color:var(--btn-primary-text);font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:opacity .15s}
    .custom-confirm:active{opacity:.85}

    /* ── COUNTER ── */
    .ctr{background:var(--card);border-radius:20px;border:3px solid var(--border);overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.12);margin-bottom:16px;transition:background .2s,border-color .2s}
    .ctr-top{display:flex;align-items:center;justify-content:space-between;padding:24px 26px 16px}
    .ctr-lbl{font-size:24px;font-weight:700;color:var(--text)}
    .ctr-val{font-family:'Montserrat',sans-serif;font-size:96px;font-weight:900;line-height:1;color:var(--text)}
    .ctr-btns{display:grid;grid-template-columns:1fr 1fr;border-top:3px solid var(--border)}
    .cbt{height:130px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;width:100%;transition:background .1s}
    .cbt svg{width:64px;height:64px;stroke-width:2.5;stroke-linecap:round;fill:none}
    .cbt.minus svg{stroke:var(--text)}
    .cbt.plus{border-left:3px solid var(--border)}
    .cbt.plus svg{stroke:var(--blue)}
    .cbt:active,.cbt.tap{background:var(--cbt-tap)}
    .cbt.plus:active,.cbt.plus.tap{background:var(--cbt-plus-tap)}

    /* ── BUTTONS ── */
    .btn-primary{width:100%;padding:24px;border-radius:16px;border:none;background:var(--btn-primary-bg);color:var(--btn-primary-text);font-family:'Montserrat',sans-serif;font-size:20px;font-weight:700;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 14px rgba(59,100,144,.3);transition:opacity .15s,background .2s}
    .btn-primary:active{opacity:.85}
    .btn-outline{width:100%;padding:22px;border-radius:16px;border:3px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:19px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
    .btn-outline:active{background:var(--cbt-tap);border-color:var(--blue)}

    /* ── HINT ── */
    .hint{text-align:center;padding:32px 22px;background:var(--hint-bg);border-radius:16px;color:var(--text);font-size:19px;font-weight:500;border:3px solid var(--hint-border);transition:background .2s}

    /* ── LOG ── */
    .log-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .log-actions{display:flex;gap:8px}
    .copy-btn,.clear-btn{padding:14px 20px;border-radius:14px;border:3px solid var(--border);background:var(--card);font-family:'DM Sans',sans-serif;font-size:17px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s}
    .copy-btn:active{background:var(--cbt-tap)}
    .clear-btn{color:var(--btn-clear-text);border-color:var(--btn-clear-border);background:var(--btn-clear-bg)}
    .clear-btn:active{opacity:.85}
    .toast{display:none;text-align:center;font-size:17px;color:var(--blue);padding:10px 0;font-weight:600}
    .log-card{background:var(--card);border:3px solid var(--border);border-left:6px solid var(--blue);border-radius:16px;padding:18px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.1);transition:background .2s}
    .log-campus{font-size:19px;font-weight:700;color:var(--text)}
    .log-svc{font-size:16px;color:var(--muted);margin-top:4px}
    .log-detail{font-size:14px;color:var(--muted);margin-top:6px}
    .log-num{font-family:'Montserrat',sans-serif;font-size:52px;font-weight:900;color:var(--text);flex-shrink:0;margin-left:16px}
    .log-empty{text-align:center;padding:52px 22px;color:var(--muted);font-size:19px}

    /* ── SETTINGS ── */
    .set-card{background:var(--card);border:3px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:18px;box-shadow:0 2px 6px rgba(0,0,0,.1);transition:background .2s}
    .set-row{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:2px solid var(--border)}
    .set-row:last-child{border-bottom:none}
    .set-lbl{font-size:19px;font-weight:700;color:var(--text)}
    .set-sub{font-size:14px;color:var(--muted);margin-top:3px}

    /* ── TOGGLE SWITCH ── */
    .toggle{position:relative;width:64px;height:34px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-track{position:absolute;inset:0;background:var(--toggle-track);border-radius:34px;cursor:pointer;transition:background .2s}
    .toggle-track:before{content:'';position:absolute;width:26px;height:26px;left:4px;top:4px;background:var(--toggle-thumb);border-radius:50%;transition:transform .2s}
    input:checked + .toggle-track{background:var(--blue)}
    input:checked + .toggle-track:before{transform:translateX(30px)}
  </style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <!--
      LOGO: Replace PASTE_BASE64_HERE with your base64 image data.
      src="data:image/jpeg;base64,PASTE_BASE64_HERE"
      Change image/jpeg to image/png if needed.
    -->
    <img class="hdr-logo" src="assets/RevLogo.jpg" alt="Revolution Church Logo">
    <div>
      <div class="hdr-r">Revolution</div>
      <div class="hdr-c">Church</div>
    </div>
  </div>
  <div class="hdr-stripe"></div>

  <div class="tabs">
    <div class="tab on" data-tab="count">Count</div>
    <div class="tab" data-tab="log">Log</div>
    <div class="tab" data-tab="settings">Settings</div>
  </div>

  <!-- COUNT -->
  <div class="view on" id="v-count">
    <div class="lbl">Campus</div>
    <div class="two-col">
      <button class="sel-btn" data-campus="canton"><div class="sel-name">Canton</div><div class="sel-sub">Thu + Sunday</div></button>
      <button class="sel-btn" data-campus="jasper"><div class="sel-name">Jasper</div><div class="sel-sub">Sunday only</div></button>
    </div>
    <div id="svcWrap" style="display:none">
      <div class="lbl">Gathering</div>
      <div class="two-col" id="svcGrid"></div>
    </div>
    <div id="counters" style="display:none">
      <div class="ctr">
        <div class="ctr-top">
          <div class="ctr-lbl">Attendance</div>
          <div class="ctr-val" id="n-count">0</div>
        </div>
        <div class="ctr-btns">
          <button class="cbt minus" data-d="-1">
            <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"><line x1="32" y1="64" x2="96" y2="64"/></svg>
          </button>
          <button class="cbt plus" data-d="1">
            <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg"><line x1="64" y1="32" x2="64" y2="96"/><line x1="32" y1="64" x2="96" y2="64"/></svg>
          </button>
        </div>
      </div>
      <button class="btn-primary" id="saveBtn">SAVE COUNT</button>
      <button class="btn-outline" id="resetBtn">Reset</button>
    </div>
    <div id="setupHint" class="hint">Select a campus to begin.</div>
  </div>

  <!-- LOG -->
  <div class="view" id="v-log">
    <div class="log-head">
      <div class="lbl" style="margin:0">Gathering Log</div>
      <div class="log-actions">
        <button class="copy-btn" id="copyBtn">Copy</button>
        <button class="clear-btn" id="clearBtn">Clear</button>
      </div>
    </div>
    <div class="toast" id="copyToast">Copied!</div>
    <div id="logList"></div>
  </div>

  <!-- SETTINGS -->
  <div class="view" id="v-settings">
    <div class="lbl">Display</div>
    <div class="set-card">
      <div class="set-row">
        <div>
          <div class="set-lbl">Dark Mode</div>
          <div class="set-sub">Easier on the eyes in low light</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="darkToggle">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

</div>

<script>
  const SVCS = {
    canton: [
      { day: 'Thursday', time: '7:00 PM' },
      { day: 'Sunday',   time: '8:00 AM' },
      { day: 'Sunday',   time: '9:30 AM' },
      { day: 'Sunday',   time: '11:15 AM' }
    ],
    jasper: [
      { day: 'Sunday', time: '9:30 AM' },
      { day: 'Sunday', time: '11:15 AM' }
    ]
  };

  let campus = null, svcIdx = null, customLabel = null, count = 0, log = [];

  // ── Storage ──
  function loadState() {
    try { const s = localStorage.getItem('rc_state'); if (s) { const st = JSON.parse(s); count = st.count || 0; campus = st.campus || null; svcIdx = st.svcIdx != null ? st.svcIdx : null; customLabel = st.customLabel || null; } } catch(e) {}
    try { const l = localStorage.getItem('rc_log'); if (l) log = JSON.parse(l); } catch(e) { log = []; }
  }
  function saveState() { try { localStorage.setItem('rc_state', JSON.stringify({ count, campus, svcIdx, customLabel })); } catch(e) {} }
  function saveLog()   { try { localStorage.setItem('rc_log',   JSON.stringify(log)); } catch(e) {} }

  // ── Dark mode ──
  const darkToggle = document.getElementById('darkToggle');
  function applyDark(on) {
    document.body.classList.toggle('dark', on);
    darkToggle.checked = on;
    try { localStorage.setItem('rc_dark', on ? '1' : '0'); } catch(e) {}
  }
  darkToggle.addEventListener('change', () => applyDark(darkToggle.checked));
  try { if (localStorage.getItem('rc_dark') === '1') applyDark(true); } catch(e) {}

  // ── Init ──
  function init() {
    loadState();
    if (campus) {
      document.querySelectorAll('.sel-btn[data-campus]').forEach(b => { if (b.dataset.campus === campus) b.classList.add('on'); });
      buildSvcGrid(campus);
      document.getElementById('svcWrap').style.display = 'block';
      if (svcIdx === 'custom' && customLabel) {
        const grid = document.getElementById('svcGrid');
        const cb = grid.querySelector('.custom-btn');
        cb.classList.add('on');
        cb.querySelector('.sel-name').textContent = customLabel;
        document.getElementById('counters').style.display = 'block';
        document.getElementById('setupHint').style.display = 'none';
        document.getElementById('n-count').textContent = count;
      } else if (svcIdx != null) {
        const btns = document.getElementById('svcGrid').querySelectorAll('.sel-btn:not(.custom-btn)');
        if (btns[svcIdx]) btns[svcIdx].classList.add('on');
        document.getElementById('counters').style.display = 'block';
        document.getElementById('setupHint').style.display = 'none';
        document.getElementById('n-count').textContent = count;
      } else {
        document.getElementById('setupHint').style.display = 'block';
        document.getElementById('setupHint').textContent = 'Select a gathering to begin.';
      }
    }
  }

  // ── Tabs ──
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    document.querySelectorAll('.view').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    document.getElementById('v-' + t.dataset.tab).classList.add('on');
    if (t.dataset.tab === 'log') renderLog();
  }));

  // ── Campus ──
  document.querySelectorAll('.sel-btn[data-campus]').forEach(b => b.addEventListener('click', () => {
    campus = b.dataset.campus; svcIdx = null; customLabel = null; count = 0;
    document.querySelectorAll('.sel-btn[data-campus]').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    buildSvcGrid(campus);
    document.getElementById('svcWrap').style.display = 'block';
    document.getElementById('counters').style.display = 'none';
    document.getElementById('setupHint').style.display = 'block';
    document.getElementById('setupHint').textContent = 'Select a gathering to begin.';
    document.getElementById('n-count').textContent = '0';
    saveState();
  }));

  // ── Gathering grid ──
  function buildSvcGrid(c) {
    const grid = document.getElementById('svcGrid');
    grid.innerHTML = SVCS[c].map((s, i) =>
      `<button class="sel-btn" data-i="${i}"><div class="sel-name">${s.time}</div><div class="sel-sub">${s.day}</div></button>`
    ).join('') + `
      <button class="sel-btn custom-btn">
        <div class="sel-name">+ Custom</div>
        <div class="sel-sub">Define your own label</div>
      </button>
      <div class="custom-input-wrap" id="customInputWrap">
        <input class="custom-input" id="customInput" type="text" placeholder="e.g. Easter, VBS, Concert...">
        <button class="custom-confirm" id="customConfirm">Start Counting</button>
      </div>`;

    grid.querySelectorAll('.sel-btn:not(.custom-btn)').forEach(sb => sb.addEventListener('click', () => {
      svcIdx = parseInt(sb.dataset.i); customLabel = null;
      grid.querySelectorAll('.sel-btn').forEach(x => x.classList.remove('on'));
      sb.classList.add('on');
      document.getElementById('customInputWrap').classList.remove('show');
      document.getElementById('counters').style.display = 'block';
      document.getElementById('setupHint').style.display = 'none';
      saveState();
    }));

    grid.querySelector('.custom-btn').addEventListener('click', () => {
      grid.querySelectorAll('.sel-btn').forEach(x => x.classList.remove('on'));
      grid.querySelector('.custom-btn').classList.add('on');
      document.getElementById('customInputWrap').classList.add('show');
      document.getElementById('customInput').focus();
      document.getElementById('counters').style.display = 'none';
      document.getElementById('setupHint').style.display = 'none';
      svcIdx = null; customLabel = null;
    });

    document.getElementById('customConfirm').addEventListener('click', () => {
      const val = document.getElementById('customInput').value.trim();
      if (!val) { document.getElementById('customInput').focus(); return; }
      customLabel = val; svcIdx = 'custom';
      grid.querySelector('.custom-btn .sel-name').textContent = val;
      document.getElementById('customInputWrap').classList.remove('show');
      document.getElementById('counters').style.display = 'block';
      document.getElementById('setupHint').style.display = 'none';
      saveState();
    });

    document.getElementById('customInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('customConfirm').click();
    });
  }

  // ── Counter ──
  function adjust(d) {
    count = Math.max(0, count + d);
    document.getElementById('n-count').textContent = count;
    saveState();
  }
  document.querySelectorAll('.cbt').forEach(b => {
    function tap(e) { e.preventDefault(); b.classList.add('tap'); setTimeout(() => b.classList.remove('tap'), 120); adjust(parseInt(b.dataset.d)); }
    b.addEventListener('touchstart', tap, { passive: false });
    b.addEventListener('click', () => { if (!('ontouchstart' in window)) adjust(parseInt(b.dataset.d)); });
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    if (campus === null || (svcIdx === null && !customLabel)) return;
    let day, time;
    if (svcIdx === 'custom') { day = 'Custom'; time = customLabel; }
    else { const s = SVCS[campus][svcIdx]; day = s.day; time = s.time; }
    log.unshift({
      campus: campus === 'canton' ? 'Canton' : 'Jasper',
      day, time, count,
      saved: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
      date:  new Date().toLocaleDateString('en-US',  { month: 'short', day: 'numeric' })
    });
    saveLog();
    count = 0;
    document.getElementById('n-count').textContent = '0';
    saveState();
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    count = 0; document.getElementById('n-count').textContent = '0'; saveState();
  });

  // ── Log ──
  function renderLog() {
    const c = document.getElementById('logList');
    if (!log.length) { c.innerHTML = '<div class="log-empty">No entries yet.<br>Count a gathering and tap Save Count.</div>'; return; }
    c.innerHTML = log.map(e =>
      `<div class="log-card">
        <div>
          <div class="log-campus">${e.campus} Campus</div>
          <div class="log-svc">${e.day === 'Custom' ? e.time : `${e.day} &middot; ${e.time}`} &middot; ${e.date}</div>
          <div class="log-detail">Saved at ${e.saved}</div>
        </div>
        <div class="log-num">${e.count}</div>
      </div>`
    ).join('');
  }

  document.getElementById('copyBtn').addEventListener('click', () => {
    if (!log.length) return;
    const lines = ['REVOLUTION CHURCH \u2014 GATHERING LOG', 'Exported: ' + new Date().toLocaleString(), ''];
    log.forEach(e => {
      const svcLine = e.day === 'Custom' ? e.time : `${e.day} ${e.time}`;
      lines.push(`${e.campus} Campus \u00b7 ${svcLine} (${e.date})`);
      lines.push(`Attendance: ${e.count} | Saved at ${e.saved}`);
      lines.push('');
    });
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      const t = document.getElementById('copyToast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000);
    });
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('Clear all saved gathering entries?')) return;
    log = []; saveLog(); renderLog();
  });

  init();
</script>
</body>
</html>
